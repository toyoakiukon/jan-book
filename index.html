<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JAN BOOK 2026年6月｜店頭スキャン用</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.6/JsBarcode.all.min.js"></script>
<style>
  :root{
    --bg:#171a21; --panel:#1f232c; --line:#2c313c; --ink:#eef1f6; --mute:#9aa3b2;
    --ym:#e60012; --sb:#5b6573; --sbInk:#0a2540; --kaden:#1f9e8c;
    --paper:#ffffff; --warn:#ffb02e;
    --kindDisc:#e60012; --kindPoint:#2f8fe0; --kindCount:#7a8290;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; padding-bottom:90px;
  }
  .tnum{font-variant-numeric:tabular-nums; font-feature-settings:"tnum" 1}

  header{
    position:sticky; top:0; z-index:30; background:rgba(23,26,33,.96);
    backdrop-filter:blur(8px); border-bottom:1px solid var(--line);
  }
  .head-row{display:flex; align-items:baseline; gap:10px; padding:12px 16px 6px}
  .logo{font-weight:800; letter-spacing:.06em; font-size:18px}
  .logo small{font-weight:600; color:var(--mute); letter-spacing:.12em; font-size:11px; margin-left:6px}
  .period{margin-left:auto; font-size:12px; color:var(--mute)}
  .search-wrap{padding:0 16px 10px}
  .search{
    width:100%; height:46px; border-radius:12px; border:1px solid var(--line);
    background:var(--panel); color:var(--ink); font-size:16px; padding:0 14px;
  }
  .search::placeholder{color:#6b7382}
  .chips{display:flex; gap:8px; overflow-x:auto; padding:0 16px 12px; -webkit-overflow-scrolling:touch}
  .chips::-webkit-scrollbar{display:none}
  .chip{
    flex:0 0 auto; padding:8px 13px; border-radius:999px; border:1px solid var(--line);
    background:transparent; color:var(--mute); font-size:13px; font-weight:600; white-space:nowrap; cursor:pointer;
  }
  .chip.on{background:var(--ink); color:#11141a; border-color:var(--ink)}

  .notice{margin:10px 16px 0; padding:10px 12px; border-radius:10px;
    background:rgba(255,176,46,.10); border:1px solid rgba(255,176,46,.35);
    font-size:12px; line-height:1.6; color:#f4d79a}
  .notice b{color:var(--warn)}

  .ref{margin:10px 16px 0; border:1px solid var(--line); border-radius:10px; background:var(--panel); overflow:hidden}
  .ref summary{padding:12px 14px; font-size:13.5px; font-weight:700; color:var(--ink); cursor:pointer; list-style:none}
  .ref summary::-webkit-details-marker{display:none}
  .ref summary::after{content:"▼"; float:right; color:var(--mute); font-size:11px}
  .ref[open] summary::after{content:"▲"}
  .ref-body{padding:2px 14px 14px}
  .ref-cat{font-size:12px; font-weight:800; color:#6fb6ee; margin:12px 0 4px; letter-spacing:.03em}
  .ref-item{display:flex; align-items:baseline; gap:8px; font-size:12.5px; padding:3px 0; border-bottom:1px solid rgba(255,255,255,.05)}
  .ref-ok{color:#5fd8c6; font-weight:800; width:16px; flex:0 0 auto; text-align:center}
  .ref-ng{color:#6b7382; font-weight:800; width:16px; flex:0 0 auto; text-align:center}
  .ref-name{flex:1; line-height:1.4}
  .ref-item.no .ref-name{color:var(--mute)}
  .ref-note{color:var(--warn); font-size:11px; margin-left:4px}

  .group-title{padding:18px 16px 4px; font-size:13px; font-weight:800; color:var(--mute); letter-spacing:.04em}
  .group-title.hide,.grid.hide{display:none}

  .grid{display:grid; grid-template-columns:repeat(2,1fr); gap:10px; padding:6px 16px 0}
  @media(min-width:720px){ .grid{grid-template-columns:repeat(3,1fr)} }
  @media(min-width:1040px){ .grid{grid-template-columns:repeat(4,1fr)} }

  .card{
    position:relative; background:var(--panel); border:1px solid var(--line);
    border-radius:14px; overflow:hidden; cursor:pointer; transition:transform .08s ease;
  }
  .card:active{transform:scale(.985)}
  .card .bar{position:absolute; left:0; top:0; bottom:0; width:5px}
  .card.ym .bar{background:var(--ym)}
  .card.sb .bar{background:var(--sb)}
  .card.kaden .bar{background:var(--kaden)}
  .card-head{display:flex; align-items:center; gap:8px; padding:11px 12px 6px 16px}
  .brandtag{font-size:10px; font-weight:800; letter-spacing:.08em; padding:2px 6px; border-radius:5px}
  .card.ym .brandtag{background:rgba(230,0,18,.16); color:#ff6b76}
  .card.sb .brandtag{background:rgba(120,140,170,.18); color:#aebacb}
  .card.kaden .brandtag{background:rgba(31,158,140,.16); color:#5fd8c6}
  .kindtag{font-size:10px; font-weight:700; color:var(--mute); margin-left:auto; padding:2px 6px; border:1px solid var(--line); border-radius:5px; white-space:nowrap}
  .kindtag.k-count{background:rgba(255,176,46,.16); color:#ffb02e; border-color:rgba(255,176,46,.5)}
  .kindtag.k-disc{background:rgba(230,0,18,.12); color:#ff7b84; border-color:rgba(230,0,18,.32)}
  .kindtag.k-point{background:rgba(47,143,224,.14); color:#6fb6ee; border-color:rgba(47,143,224,.38)}
  .card.kcount{background:#24221d}
  .name{padding:0 12px 0 16px; font-size:12.5px; font-weight:600; line-height:1.35; color:var(--ink); min-height:34px}
  .sub{padding:2px 12px 0 16px; font-size:11px; color:var(--mute); line-height:1.4}
  .value{padding:6px 12px 2px 16px; font-weight:800; letter-spacing:-.01em}
  .value .num{font-size:22px}
  .value .unit{font-size:12px; color:var(--mute); margin-left:2px}
  .value.disc .num{color:#ff7b84}
  .value.point .num{color:#6fb6ee}
  .value.count{font-size:12px; color:#ffb02e; font-weight:800; padding-top:8px}
  .barcode{background:var(--paper); margin:10px 10px 12px; border-radius:8px; padding:8px 6px 4px; text-align:center}
  .barcode svg{width:100%; height:54px; display:block}
  .code{font-size:11px; color:#1a1d23; letter-spacing:.04em; padding-bottom:4px; font-weight:600}
  .warnflag{font-size:10.5px; color:var(--warn); padding:0 12px 10px 16px; line-height:1.4}

  .empty{padding:60px 24px; text-align:center; color:var(--mute)}

  /* 選択・数量UI（カード下部） */
  .card.selected{outline:2px solid #2f8fe0; outline-offset:-2px}
  .selrow{padding:0 10px 12px}
  .selbtn{width:100%; height:38px; border:1px solid #2f8fe0; background:transparent; color:#6fb6ee;
    border-radius:10px; font-size:13px; font-weight:700; cursor:pointer}
  .stepper{display:flex; align-items:center; justify-content:space-between; height:38px;
    background:#2f8fe0; border-radius:10px; overflow:hidden}
  .stepper button{width:50px; height:38px; border:0; background:transparent; color:#fff;
    font-size:22px; font-weight:700; cursor:pointer; line-height:1}
  .stepper .qn{color:#fff; font-weight:800; font-size:14px; flex:1; text-align:center}

  .tray{position:fixed; left:0; right:0; bottom:0; z-index:40; transform:translateY(130%);
    transition:transform .2s ease; background:rgba(31,35,44,.98); backdrop-filter:blur(8px);
    border-top:1px solid var(--line); padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    display:flex; align-items:center; gap:10px}
  .tray.on{transform:translateY(0)}
  .tray #trayCount{font-weight:700; font-size:14px; flex:1}
  .tray button{height:42px; border:0; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; padding:0 16px; flex:0 0 auto}
  .tray #trayClear{background:transparent; color:var(--mute); border:1px solid var(--line)}
  .tray #trayShow{background:#2f8fe0; color:#fff}

  .bnav{display:flex; gap:10px; margin-top:14px}
  .bnav button{flex:1; height:46px; border:1px solid var(--line); border-radius:12px;
    background:#f1f3f6; color:#11141a; font-size:15px; font-weight:700; cursor:pointer}
  .bnav button:disabled{opacity:.35}

  /* modal */
  .modal{position:fixed; inset:0; z-index:50; background:rgba(8,10,14,.92); display:none;
    align-items:center; justify-content:center; padding:20px}
  .modal.on{display:flex}
  .sheet{background:#fff; color:#11141a; border-radius:18px; width:100%; max-width:520px; padding:20px 18px 18px; text-align:center}
  .sheet .m-brand{font-size:12px; font-weight:800; letter-spacing:.06em}
  .sheet .m-name{font-size:18px; font-weight:800; margin:6px 0 2px; line-height:1.3}
  .sheet .m-sub{font-size:13px; color:#5a6270; margin-bottom:6px}
  .sheet .m-warn{font-size:12.5px; color:#9a5b00; background:#fff3dc; border:1px solid #f0c674; border-radius:8px; padding:8px 10px; margin:0 auto 10px; line-height:1.5}
  .sheet .m-qty{background:#2f8fe0; color:#fff; font-weight:800; font-size:17px; padding:8px 20px; border-radius:999px; margin:0 auto 12px}
  .sheet .m-val{font-size:30px; font-weight:900; margin:2px 0 14px; letter-spacing:-.02em}
  .sheet .m-barcode{background:#fff; padding:6px}
  .sheet .m-barcode svg{width:100%; height:120px}
  .sheet .m-code{font-size:15px; letter-spacing:.08em; font-weight:700; margin-top:4px}
  .sheet .m-hint{font-size:12px; color:#8a93a1; margin-top:12px; line-height:1.5}
  .sheet .m-close{margin-top:16px; width:100%; height:46px; border:0; border-radius:12px;
    background:#11141a; color:#fff; font-size:15px; font-weight:700; cursor:pointer}
</style>
</head>

<header>
  <div class="head-row">
    <div class="logo">JAN BOOK<small>2026.06</small></div>

  </div>
  <div class="search-wrap">
    <input id="q" class="search" type="search" inputmode="search" placeholder="名称・金額・JANコードで検索（例: 16500 / カウント / 17e）">
  </div>
  <div class="chips" id="chips"></div>

<div class="notice">

</div>

<details class="ref" id="refTaisho">

  <div class="ref-body" id="refBody"></div>
</details>

<main id="list"></main>

<div class="modal" id="modal" onclick="closeModal(event)">
  <div class="sheet" id="sheet" onclick="event.stopPropagation()">
    <div class="m-brand" id="mBrand"></div>
    <div class="m-name" id="mName"></div>
    <div class="m-sub" id="mSub"></div>
    <div class="m-warn" id="mWarn" style="display:none"></div>
    <div class="m-val" id="mVal"></div>
    <div class="m-barcode"><svg id="mSvg"></svg></div>
    <div class="m-code tnum" id="mCode"></div>
    <div class="m-hint">画面の明るさを最大にしてスキャンしてください</div>
    <button class="m-close" onclick="closeModal()">閉じる</button>
  </div>
</div>

<div class="tray" id="tray">
  <span id="trayCount">0件 選択中</span>
  <button id="trayClear">クリア</button>
  <button id="trayShow">まとめてスキャン</button>
</div>

<div class="modal" id="bmodal" onclick="closeBatch(event)">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="m-brand" id="bIndex"></div>
    <div class="m-name" id="bName"></div>
    <div class="m-sub" id="bSub"></div>
    <div class="m-val" id="bVal"></div>
    <div class="m-qty" id="bQty" style="display:none"></div>
    <div class="m-barcode"><svg id="bSvg"></svg></div>
    <div class="m-code tnum" id="bCode"></div>
    <div class="m-hint">スキャンしたら「次へ」／左右スワイプでも送れます</div>
    <div class="bnav">
      <button id="bPrev">‹ 前へ</button>
      <button id="bNext">次へ ›</button>
    </div>
    <button class="m-close" onclick="closeBatch()">閉じる</button>
  </div>
</div>

var KIND_LABEL = {disc:"値引き", point:"ポイント", count:"カウント"};
var BRAND_LABEL = {ym:"Y!mobile", sb:"SoftBank", kaden:"家電/固定"};
var GROUP_ORDER = [
  "YM カウント","YM ポイント","YM おうち割",
  "SB カウント","SB おうち割","SB SIM単体","SB ブロードバンド",
  "家電 カウント","家電 値引き","パナソニック ポイント","電気・ガス",
  "SB ノートン","YM 値引き","YM リユース"  // ほぼ使わないため右端へ
];
var GROUPS = [];
GROUP_ORDER.forEach(function(g){
  if(GROUPS.indexOf(g)<0 && DATA.some(function(d){ return d.group===g; })) GROUPS.push(g);
});
DATA.forEach(function(d){ if(GROUPS.indexOf(d.group)<0) GROUPS.push(d.group); });

// ===== フィルタ状態 =====
var state = {chip:"すべて", q:""};
var SELECTED = []; // [{code, qty}] 選択順を保持

// ===== チップ生成 =====
var chipsEl = document.getElementById("chips");
["すべて"].concat(GROUPS).forEach(function(g){
  var c = document.createElement("button");
  c.className = "chip" + (g==="すべて"?" on":"");
  c.textContent = g;
  c.onclick = function(){
    state.chip = g;
    [].forEach.call(chipsEl.children, function(x){ x.classList.remove("on"); });
    c.classList.add("on");
    render();
  };
  chipsEl.appendChild(c);
});

// ===== 検索 =====
document.getElementById("q").addEventListener("input", function(e){
  state.q = e.target.value.trim().toLowerCase();
  render();
});

// ===== 描画 =====
var listEl = document.getElementById("list");

function match(d){
  if(state.chip!=="すべて" && d.group!==state.chip) return false;
  if(state.q){
    var hay = (d.name+" "+(d.sub||"")+" "+(d.val||"")+" "+d.code+" "+BRAND_LABEL[d.brand]+" "+KIND_LABEL[d.kind]).toLowerCase();
    if(hay.indexOf(state.q)<0) return false;
  }
  return true;
}

function render(){
  listEl.innerHTML = "";
  var shown = DATA.filter(match);
  if(shown.length===0){
    listEl.innerHTML = '<div class="empty">該当するJANがありません。<br>検索ワードを変えてみてください。</div>';
    return;
  }
  GROUPS.forEach(function(g){
    var items = shown.filter(function(d){ return d.group===g; });
    if(items.length===0) return;
    var t = document.createElement("div");
    t.className = "group-title";
    t.textContent = g + "（" + items.length + "）";
    listEl.appendChild(t);
    var grid = document.createElement("div");
    grid.className = "grid";
    items.forEach(function(d){ grid.appendChild(buildCard(d)); });
    listEl.appendChild(grid);
  });
  // バーコード描画
  [].forEach.call(document.querySelectorAll("svg[data-code]"), function(svg){
    try{
      JsBarcode(svg, svg.getAttribute("data-code"), {format:"EAN13", displayValue:false, margin:0, height:54, width:1.6});
    }catch(err){ svg.parentNode.innerHTML = '<div class="code">'+svg.getAttribute("data-code")+'</div>'; }
  });
  updateTray();
}

function buildCard(d){
  var card = document.createElement("div");
  card.className = "card " + d.brand + (d.kind==="count"?" kcount":"") + (isSelected(d.code)?" selected":"");
  var valHTML = "";
  if(d.kind==="count"){
    valHTML = '<div class="value count">識別 / カウント用</div>';
  }else{
    var cls = d.kind==="disc" ? "disc" : "point";
    valHTML = '<div class="value '+cls+'"><span class="num tnum">'+d.val+'</span><span class="unit">'+d.unit+'</span></div>';
  }
  card.innerHTML =
    '<div class="bar"></div>' +
    '<div class="card-head">' +
      '<span class="brandtag">'+BRAND_LABEL[d.brand]+'</span>' +
      '<span class="kindtag k-'+d.kind+'">'+KIND_LABEL[d.kind]+'</span>' +
    '</div>' +
    '<div class="name">'+d.name+'</div>' +
    (d.sub?'<div class="sub">'+d.sub+'</div>':'') +
    valHTML +
    (d.warn?'<div class="warnflag">⚠ '+d.warn+'</div>':'') +
    '<div class="barcode"><svg data-code="'+d.code+'"></svg><div class="code tnum">'+d.code+'</div></div>' +
    '<div class="selrow"></div>';
  card.onclick = function(){ openModal(d); };
  renderSelRow(card, d);
  return card;
}

// ===== 選択・数量・まとめてスキャン =====
function selIndex(code){ for(var i=0;i<SELECTED.length;i++){ if(SELECTED[i].code===code) return i; } return -1; }
function getQty(code){ var i=selIndex(code); return i>=0 ? SELECTED[i].qty : 0; }
function setQty(code, q){
  var i = selIndex(code);
  if(q<=0){ if(i>=0) SELECTED.splice(i,1); }
  else { if(i>=0) SELECTED[i].qty = q; else SELECTED.push({code:code, qty:q}); }
}
function isSelected(code){ return getQty(code) > 0; }

function renderSelRow(card, d){
  var sel = card.querySelector(".selrow");
  var q = getQty(d.code);
  card.classList.toggle("selected", q>0);
  sel.innerHTML = "";
  if(q<=0){
    var b = document.createElement("button");
    b.className = "selbtn"; b.textContent = "＋ 選択";
    b.onclick = function(e){ e.stopPropagation(); setQty(d.code,1); renderSelRow(card,d); updateTray(); };
    sel.appendChild(b);
  }else{
    var w = document.createElement("div"); w.className = "stepper";
    var m = document.createElement("button"); m.textContent = "−"; m.setAttribute("aria-label","減らす");
    m.onclick = function(e){ e.stopPropagation(); setQty(d.code,q-1); renderSelRow(card,d); updateTray(); };
    var n = document.createElement("span"); n.className = "qn"; n.textContent = "×"+q+" 回";
    var p = document.createElement("button"); p.textContent = "＋"; p.setAttribute("aria-label","増やす");
    p.onclick = function(e){ e.stopPropagation(); setQty(d.code,q+1); renderSelRow(card,d); updateTray(); };
    w.appendChild(m); w.appendChild(n); w.appendChild(p);
    sel.appendChild(w);
  }
}
function updateTray(){
  var tray = document.getElementById("tray");
  if(SELECTED.length>0){
    var total = 0; SELECTED.forEach(function(s){ total += s.qty; });
    tray.classList.add("on");
    document.getElementById("trayCount").textContent = SELECTED.length + "種 / 合計 " + total + "回";
  }else{
    tray.classList.remove("on");
  }
}
function findByCode(code){
  for(var i=0;i<DATA.length;i++){ if(DATA[i].code===code) return DATA[i]; }
  return null;
}
var BATCH = [], bIndex = 0;
function openBatch(){
  BATCH = SELECTED.map(function(s){ return {d:findByCode(s.code), qty:s.qty}; })
                  .filter(function(x){ return x.d; });
  if(BATCH.length===0) return;
  bIndex = 0; showBatch();
  document.getElementById("bmodal").classList.add("on");
}
function showBatch(){
  var item = BATCH[bIndex];
  var d = item.d;
  document.getElementById("bIndex").textContent = (bIndex+1) + " / " + BATCH.length + "　" + BRAND_LABEL[d.brand] + "・" + KIND_LABEL[d.kind];
  document.getElementById("bName").textContent = d.name;
  document.getElementById("bSub").textContent = d.sub || "";
  var bVal = document.getElementById("bVal");
  if(d.kind==="count"){ bVal.textContent="識別 / カウント用"; bVal.style.fontSize="16px"; bVal.style.color="#5a6270"; }
  else { bVal.textContent = d.val + (d.unit==="円"?"円":"P"); bVal.style.fontSize="30px"; bVal.style.color="#11141a"; }
  var bQty = document.getElementById("bQty");
  if(item.qty>1){ bQty.style.display="inline-block"; bQty.textContent="×"+item.qty; }
  else { bQty.style.display="none"; }
  document.getElementById("bCode").textContent = d.code;
  var s = document.getElementById("bSvg"); s.innerHTML = "";
  try{ JsBarcode(s, d.code, {format:"EAN13", displayValue:false, margin:6, height:120, width:2.4}); }catch(e){}
  document.getElementById("bPrev").disabled = bIndex===0;
  document.getElementById("bNext").disabled = bIndex===BATCH.length-1;
}
function closeBatch(e){
  if(e && e.target && e.target.id!=="bmodal") return;
  document.getElementById("bmodal").classList.remove("on");
}
document.getElementById("bPrev").onclick = function(){ if(bIndex>0){ bIndex--; showBatch(); } };
document.getElementById("bNext").onclick = function(){ if(bIndex<BATCH.length-1){ bIndex++; showBatch(); } };
document.getElementById("trayClear").onclick = function(){ SELECTED = []; updateTray(); render(); };
document.getElementById("trayShow").onclick = openBatch;

// まとめてスキャン：左右スワイプで前後送り
(function(){
  var sheet = document.querySelector("#bmodal .sheet");
  var sx = 0, sy = 0;
  sheet.addEventListener("touchstart", function(e){ sx=e.changedTouches[0].clientX; sy=e.changedTouches[0].clientY; }, {passive:true});
  sheet.addEventListener("touchend", function(e){
    var dx = e.changedTouches[0].clientX - sx;
    var dy = e.changedTouches[0].clientY - sy;
    if(Math.abs(dx) > 45 && Math.abs(dx) > Math.abs(dy)){
      if(dx < 0 && bIndex < BATCH.length-1){ bIndex++; showBatch(); }
      else if(dx > 0 && bIndex > 0){ bIndex--; showBatch(); }
    }
  }, {passive:true});
})();

// ===== モーダル拡大 =====
function openModal(d){
  document.getElementById("mBrand").textContent = BRAND_LABEL[d.brand] + " ・ " + KIND_LABEL[d.kind];
  document.getElementById("mBrand").style.color =
    d.brand==="ym" ? "#e60012" : (d.brand==="sb" ? "#5b6573" : "#1f9e8c");
  document.getElementById("mName").textContent = d.name;
  document.getElementById("mSub").textContent = d.sub || "";
  var mWarn = document.getElementById("mWarn");
  if(d.warn){ mWarn.style.display="block"; mWarn.textContent="⚠ "+d.warn; } else { mWarn.style.display="none"; }
  var mVal = document.getElementById("mVal");
  if(d.kind==="count"){ mVal.textContent = "識別 / カウント用"; mVal.style.color="#5a6270"; mVal.style.fontSize="16px"; }
  else { mVal.textContent = d.val + (d.unit==="円"?"円":"P"); mVal.style.color="#11141a"; mVal.style.fontSize="30px"; }
  document.getElementById("mCode").textContent = d.code;
  var mSvg = document.getElementById("mSvg");
  mSvg.innerHTML = "";
  try{ JsBarcode(mSvg, d.code, {format:"EAN13", displayValue:false, margin:6, height:120, width:2.4}); }catch(e){}
  document.getElementById("modal").classList.add("on");
}
function closeModal(e){
  if(e && e.target && e.target.id!=="modal" && e.type!=="click") return;
  document.getElementById("modal").classList.remove("on");
}
